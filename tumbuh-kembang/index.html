<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <title>Pemantau Tumbuh Kembang Anak (0–24 bulan)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Pantau berat, tinggi, dan lingkar kepala anak 0–24 bulan dengan standar antropometri Kemenkes/WHO. Data tersimpan di perangkat Anda.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/main.css" rel="stylesheet">
</head>
<body class="bg-body-tertiary">
  <header class="text-center py-4">
    <div class="container">
      <h1 class="h3 fw-bold text-success">Pemantau Tumbuh Kembang Anak</h1>
      <p class="text-secondary mb-1">Usia 0–24 bulan · standar antropometri Kemenkes RI (WHO)</p>
      <p class="small text-secondary mb-0">Hasil bersifat indikatif untuk skrining mandiri, <strong>bukan</strong> pengganti pemeriksaan tenaga kesehatan.</p>
    </div>
  </header>

  <main class="container pb-5">
    <div class="card shadow-sm mb-3">
      <div class="card-body d-flex flex-wrap align-items-center gap-2">
        <label for="child-select" class="fw-semibold mb-0">Anak:</label>
        <select id="child-select" class="form-select" style="flex:1 1 200px;width:auto;" aria-label="Pilih anak"></select>
        <button id="btn-add-child" type="button" class="btn btn-success">+ Tambah</button>
        <button id="btn-edit-child" type="button" class="btn btn-outline-secondary">Edit</button>
        <button id="btn-delete-child" type="button" class="btn btn-outline-danger">Hapus</button>
      </div>
    </div>

    <div class="card shadow-sm mb-3">
      <div class="card-body">
        <h2 class="h5 card-title">Input Pengukuran</h2>
        <form id="measure-form" class="row g-3 align-items-end">
          <div class="col-6 col-md">
            <label for="m-date" class="form-label">Tanggal ukur</label>
            <input type="date" id="m-date" class="form-control" required>
          </div>
          <div class="col-6 col-md">
            <label class="form-label">Umur</label>
            <div id="m-age" class="form-control-plaintext fw-bold">—</div>
          </div>
          <div class="col-6 col-md">
            <label for="m-weight" class="form-label">Berat (kg)</label>
            <input type="number" id="m-weight" class="form-control" step="0.01" min="0" max="40" inputmode="decimal">
          </div>
          <div class="col-6 col-md">
            <label for="m-height" class="form-label">Tinggi/Panjang (cm)</label>
            <input type="number" id="m-height" class="form-control" step="0.1" min="0" max="120" inputmode="decimal">
          </div>
          <div class="col-6 col-md">
            <label for="m-head" class="form-label">Lingkar kepala (cm)</label>
            <input type="number" id="m-head" class="form-control" step="0.1" min="0" max="70" inputmode="decimal">
          </div>
          <div class="col-12">
            <button type="submit" class="btn btn-success">Simpan pengukuran</button>
          </div>
        </form>
      </div>
    </div>

    <div class="card shadow-sm mb-3">
      <div class="card-body">
        <h2 class="h5 card-title">Ringkasan Status Gizi</h2>
        <div id="summary" class="row g-2"></div>
      </div>
    </div>

    <div class="row g-3" id="charts">
      <div class="col-12 col-lg-6">
        <figure class="card shadow-sm chart-card h-100 mb-0">
          <figcaption class="card-header d-flex justify-content-between align-items-center fw-semibold"><span>BB/U — Berat menurut Umur</span></figcaption>
          <div class="card-body chart-body"><canvas id="chart-wfa"></canvas></div>
        </figure>
      </div>
      <div class="col-12 col-lg-6">
        <figure class="card shadow-sm chart-card h-100 mb-0">
          <figcaption class="card-header d-flex justify-content-between align-items-center fw-semibold"><span>PB/U–TB/U — Tinggi menurut Umur</span></figcaption>
          <div class="card-body chart-body"><canvas id="chart-lhfa"></canvas></div>
        </figure>
      </div>
      <div class="col-12 col-lg-6">
        <figure class="card shadow-sm chart-card h-100 mb-0">
          <figcaption class="card-header d-flex justify-content-between align-items-center fw-semibold"><span>LK/U — Lingkar Kepala menurut Umur</span></figcaption>
          <div class="card-body chart-body"><canvas id="chart-hcfa"></canvas></div>
        </figure>
      </div>
      <div class="col-12 col-lg-6">
        <figure class="card shadow-sm chart-card h-100 mb-0">
          <figcaption class="card-header d-flex justify-content-between align-items-center fw-semibold"><span>BB/PB — Berat menurut Panjang</span></figcaption>
          <div class="card-body chart-body"><canvas id="chart-wfl"></canvas></div>
        </figure>
      </div>
      <div class="col-12 col-lg-6">
        <figure class="card shadow-sm chart-card h-100 mb-0">
          <figcaption class="card-header d-flex justify-content-between align-items-center fw-semibold"><span>IMT/U — IMT menurut Umur</span></figcaption>
          <div class="card-body chart-body"><canvas id="chart-bfa"></canvas></div>
        </figure>
      </div>
    </div>

    <div class="card shadow-sm mt-3">
      <div class="card-body">
        <h2 class="h5 card-title">Riwayat Pengukuran</h2>
        <div class="table-responsive">
          <table id="history-table" class="table table-striped align-middle mb-0">
            <thead><tr><th>Tanggal</th><th>Umur</th><th>BB (kg)</th><th>TB (cm)</th><th>LK (cm)</th><th></th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <div class="modal fade" id="child-dialog" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="child-dialog-title">Tambah Anak</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Tutup"></button>
        </div>
        <div class="modal-body">
          <form id="child-form">
            <div class="mb-3"><label for="c-name" class="form-label">Nama</label><input type="text" id="c-name" class="form-control" required></div>
            <div class="mb-3"><label for="c-sex" class="form-label">Jenis kelamin</label>
              <select id="c-sex" class="form-select"><option value="L">Laki-laki</option><option value="P">Perempuan</option></select>
            </div>
            <div class="mb-3"><label for="c-birth" class="form-label">Tanggal lahir</label><input type="date" id="c-birth" class="form-control" required></div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Batal</button>
          <button type="button" id="child-save" class="btn btn-success">Simpan</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/who-data.js"></script>
  <script src="js/growth.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/app.js"></script>
</body>
</html>

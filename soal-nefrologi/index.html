<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soal Nefrologi</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 1.5rem;
        }
        .box {
            text-align: center;
            max-width: 420px;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0 0 0.75rem;
        }
        p {
            margin: 0 0 2rem;
            color: #94a3b8;
            font-size: 1rem;
            line-height: 1.5;
        }
        .btn {
            display: inline-block;
            padding: 0.85rem 2rem;
            background: #38bdf8;
            color: #0f172a;
            font-weight: 600;
            font-size: 1.05rem;
            text-decoration: none;
            border-radius: 10px;
            transition: background 0.2s, transform 0.1s;
        }
        .btn:hover { background: #7dd3fc; }
        .btn:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="box">
        <h1>Soal Nefrologi</h1>
        <p>Klik tombol di bawah untuk membuka aplikasi soal.</p>
        <a class="btn" href="http://136.112.224.10:5173">Buka Soal Nefrologi</a>
    </div>
</body>
</html>
